<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Make Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --acc:#FF6B47;--acc2:#e05530;
  --white:rgba(255,255,255,.97);
  --bg:#F2EDE8;--tx:#1C1410;--tx2:#9A8A7E;--bd:#E4D8D0;
  --panel-peek:72px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#b4c8d8;
  font-family:-apple-system,'SF Pro Display',sans-serif;touch-action:none}
canvas{position:fixed;inset:0;width:100%!important;height:100%!important;display:block;touch-action:none}

/* ── TOP BAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:40;
  padding:max(14px,env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;pointer-events:none}
.logo{font-size:20px;font-weight:900;letter-spacing:-.5px;
  background:var(--white);border-radius:24px;padding:9px 16px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);pointer-events:all;color:var(--tx)}
.logo span{color:var(--acc)}
.top-btns{display:flex;gap:8px}
.icon-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  background:var(--white);box-shadow:0 4px 20px rgba(0,0,0,.12);
  font-size:18px;display:flex;align-items:center;justify-content:center;
  pointer-events:all;transition:transform .12s}
.icon-btn:active{transform:scale(.88)}

/* ── ACTION BAR ── */
#actbar{position:fixed;top:0;left:0;right:0;z-index:50;
  padding:max(14px,env(safe-area-inset-top)) 12px 10px;
  display:flex;align-items:center;gap:8px;justify-content:center;
  transform:translateY(-120%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
#actbar.show{transform:translateY(0)}
.act-btn{flex:1;max-width:90px;padding:10px 4px;border:none;cursor:pointer;
  border-radius:16px;font-size:12px;font-weight:700;
  background:var(--white);box-shadow:0 4px 20px rgba(0,0,0,.14);
  color:var(--tx);display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s}
.act-btn:active{transform:scale(.88)}
.act-btn .ai{font-size:18px}
.act-btn.acc{background:var(--acc);color:#fff}
.act-btn.red{color:#D93025}

/* ── HINT ── */
#hint{position:fixed;bottom:calc(var(--panel-peek) + 20px);left:50%;
  transform:translateX(-50%);z-index:35;
  background:rgba(20,12,8,.75);color:#fff;
  padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;
  backdrop-filter:blur(8px)}
#hint.show{opacity:1}

/* ── BOTTOM PANEL ── */
#panel{position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--white);border-radius:28px 28px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,.13);
  transform:translateY(calc(100% - var(--panel-peek)));
  transition:transform .38s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  max-height:72vh;overflow:hidden;display:flex;flex-direction:column}
#panel.open{transform:translateY(0)}
.panel-handle-row{padding:10px 16px 6px;display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.phandle{width:40px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto}
.panel-tabs{display:flex;gap:6px;padding:4px 16px 10px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.panel-tabs::-webkit-scrollbar{display:none}
.ptab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);
  font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;
  background:transparent;color:var(--tx2);transition:all .14s;flex-shrink:0}
.ptab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
#fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:0 16px 12px;overflow-y:auto;scrollbar-width:none;flex:1}
#fgrid::-webkit-scrollbar{display:none}
.fi{display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px 8px;border-radius:14px;background:#F7F2EE;
  cursor:pointer;border:2px solid transparent;transition:all .13s}
.fi:active{transform:scale(.86)}
.fi.on{border-color:var(--acc);background:#FFF4F1;box-shadow:0 0 0 3px rgba(255,107,71,.18)}
.fi-thumb{width:52px;height:52px;object-fit:contain;border-radius:8px;display:block;
  background:#EDEBE8;transition:opacity .2s}
.fi-thumb.loading{opacity:.4}
.fi .fn{font-size:9px;font-weight:700;color:var(--tx2);text-align:center;line-height:1.3;margin-top:2px}

/* ── ROOM PANEL ── */
#roompanel{position:fixed;left:0;right:0;bottom:0;z-index:31;
  background:var(--white);border-radius:28px 28px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,.15);
  transform:translateY(100%);transition:transform .38s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(16px,env(safe-area-inset-bottom));max-height:60vh;overflow-y:auto}
#roompanel.open{transform:translateY(0)}
.rph{display:flex;align-items:center;padding:16px 16px 8px}
.rph h3{font-size:16px;font-weight:800;color:var(--tx)}
.rph-close{margin-left:auto;background:none;border:none;font-size:22px;color:var(--tx2);cursor:pointer;padding:4px;line-height:1}
.rpsec{padding:0 16px 16px}
.rplab{font-size:11px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;flex-shrink:0;
  border:2.5px solid transparent;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:all .12s}
.swatch:active{transform:scale(.8)}
.swatch.on{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,107,71,.3)}
.divider{height:1px;background:var(--bd);margin:4px 16px 16px}

/* ── COLOR PANEL ── */
#colorpanel{position:fixed;left:0;right:0;bottom:0;z-index:52;
  background:var(--white);border-radius:28px 28px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,.18);
  transform:translateY(100%);transition:transform .38s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(16px,env(safe-area-inset-bottom))}
#colorpanel.open{transform:translateY(0)}
.cph{display:flex;align-items:center;padding:16px 16px 10px}
.cph h3{font-size:15px;font-weight:800;color:var(--tx)}
.cph-close{margin-left:auto;background:none;border:none;font-size:22px;color:var(--tx2);cursor:pointer;padding:4px}
.ctabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.ctabs::-webkit-scrollbar{display:none}
.ctab{padding:5px 13px;border-radius:16px;border:1.5px solid var(--bd);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
  background:transparent;color:var(--tx2);transition:all .13s}
.ctab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
#ccolors{display:flex;gap:10px;flex-wrap:wrap;padding:0 16px 16px}
.cc{width:42px;height:42px;border-radius:50%;cursor:pointer;flex-shrink:0;
  border:2.5px solid transparent;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:all .12s}
.cc:active{transform:scale(.8)}
.cc.on{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,107,71,.3)}

/* ── LOADING ── */
#loader{position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.lspin{width:48px;height:48px;border:4px solid var(--bd);border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader h2{font-size:24px;font-weight:900;color:var(--tx)}
#loader p{font-size:13px;color:var(--tx2)}
.lbar{width:200px;height:5px;border-radius:3px;background:var(--bd);overflow:hidden}
.lfill{height:100%;background:var(--acc);width:0%;transition:width .3s;border-radius:3px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--panel-peek) + 24px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(20,12,8,.82);color:#fff;padding:10px 22px;
  border-radius:24px;font-size:13px;font-weight:600;
  pointer-events:none;z-index:60;opacity:0;transition:all .25s;white-space:nowrap;
  backdrop-filter:blur(8px)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="loader">
  <div class="lspin"></div>
  <h2>Make Room</h2>
  <p id="ltxt">Yükleniyor...</p>
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
</div>

<canvas id="c"></canvas>

<div id="topbar">
  <div class="logo">Make<span>Room</span></div>
  <div class="top-btns">
    <button class="icon-btn" id="btn-room" title="Oda">🎨</button>
    <button class="icon-btn" id="btn-ss"   title="Fotoğraf">📸</button>
  </div>
</div>

<div id="actbar">
  <button class="act-btn acc" id="act-color"><div class="ai">🎨</div><div>Renk</div></button>
  <button class="act-btn" id="act-rot"><div class="ai">↻</div><div>Döndür</div></button>
  <button class="act-btn" id="act-dup"><div class="ai">⎘</div><div>Kopyala</div></button>
  <button class="act-btn red" id="act-del"><div class="ai">✕</div><div>Sil</div></button>
</div>

<div id="panel">
  <div class="panel-handle-row" id="panel-toggle"><div class="phandle"></div></div>
  <div class="panel-tabs" id="ptabs"></div>
  <div id="fgrid"></div>
</div>

<div id="roompanel">
  <div class="rph"><h3>🏠 Oda Tasarımı</h3><button class="rph-close" id="rph-close">✕</button></div>
  <div class="rpsec"><div class="rplab">Duvar</div><div class="swatches" id="sw-wall"></div></div>
  <div class="divider"></div>
  <div class="rpsec"><div class="rplab">Zemin</div><div class="swatches" id="sw-floor"></div></div>
</div>

<div id="colorpanel">
  <div class="cph"><h3>🎨 Renk Değiştir</h3><button class="cph-close" id="cph-close">✕</button></div>
  <div class="ctabs" id="ctabs"></div>
  <div id="ccolors"></div>
</div>

<div id="hint"></div>
<div id="toast"></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ═══ DYNAMIC CATALOG (built from GLB) ═══ */
let CATALOG = [];
const templates = {};

/* Color palettes for the picker */
const PAL = {
  fabric:[
    {n:'Doğal', c:['#F5EFE6','#E8D8C0','#D4B898','#C49878','#A87850','#8A6040','#6A4030','#4A2820']},
    {n:'Pastel',c:['#F9D8D8','#F0B8C0','#E098A8','#C87890','#A05878','#804060','#602848','#401830']},
    {n:'Soğuk', c:['#D8E4F0','#B8C8E0','#98ACD0','#7890C0','#5874A8','#405890','#283C78','#182860']},
    {n:'Nötr',  c:['#F0F0F0','#D8D8D8','#C0C0C0','#A8A8A8','#909090','#787878','#606060','#404040']},
  ],
  wood:[
    {n:'Açık',  c:['#F5E8D0','#E8D0A8','#D4B880','#C0A060','#A88040','#906030','#784820','#603010']},
    {n:'Koyu',  c:['#8A6848','#705030','#583820','#402810','#301808','#201008','#382018','#4A3020']},
    {n:'Boyalı',c:['#FFFFFF','#E8E8E8','#B0C8B0','#D8C8A0','#C07860','#A85838','#6080C8','#883818']},
  ],
  metal:[
    {n:'Metal', c:['#F0F0F0','#D8D8D0','#C0C0B8','#A8A8A0','#909088','#787870','#606058','#484840']},
    {n:'Renkli',c:['#C8D8E8','#98A8C8','#C8B8A0','#B8A888','#D8C8A8','#E8D8B8','#C8B890','#A89870']},
  ],
  plant:[
    {n:'Yeşil', c:['#A8D8A0','#88C080','#60A860','#488040','#306820','#205018','#183810','#102808']},
    {n:'Saksı', c:['#E8C890','#D0A860','#B88840','#A06820','#885010','#703808','#582808','#402010']},
  ],
};
const WALL_SW  = ['#FFFFFF','#FDF6E3','#FFE8D8','#F8D0C0','#F0C8D0','#D8C0D8','#C0C8D8','#C8D8C8','#B8D0B0','#607888','#3C2820','#1E1820'];
const FLOOR_SW = ['#F5EFE5','#E8D8C0','#D4B898','#C0A070','#A87848','#C8C0B0','#989080','#887870','#504030','#302010','#1E1210','#8A7060'];

/* ═══ THREE.JS SETUP ═══ */
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('c'),
  antialias: true,
  powerPreference: 'high-performance',
  preserveDrawingBuffer: true,
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xB4C8D8);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.05, 80);
function setCameraDefault(){ camera.position.set(6,8,9); camera.lookAt(-0.5,0.5,-0.5); }
setCameraDefault();

/* ═══ ROOM ═══ */
const ROOM = {W:8, H:3.2, D:8};
const mats = {};

function buildRoom(){
  const {W,H,D} = ROOM;
  mats.wall  = new THREE.MeshStandardMaterial({color:0xEEE5D5, roughness:.88, side:THREE.DoubleSide});
  mats.floor = new THREE.MeshStandardMaterial({color:0xBE9E6E, roughness:.85, metalness:.02, side:THREE.DoubleSide});

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D), mats.floor);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; floor.name='__floor'; scene.add(floor);

  const bw = new THREE.Mesh(new THREE.PlaneGeometry(W,H), mats.wall);
  bw.position.set(0,H/2,-D/2); bw.receiveShadow=true; scene.add(bw);

  const lw = new THREE.Mesh(new THREE.PlaneGeometry(D,H), mats.wall);
  lw.position.set(-W/2,H/2,0); lw.rotation.y=Math.PI/2; lw.receiveShadow=true; scene.add(lw);

  const grid = new THREE.GridHelper(W,16,0xC4B090,0xD8C8A8);
  grid.position.y=0.002; scene.add(grid);

  const bm = new THREE.MeshStandardMaterial({color:0xE0CFBE, roughness:.9});
  [[W,.04,0,0,0,-D/2],[D,.04,0,Math.PI/2,-W/2,0]].forEach(([w,d,rx,ry,px,pz])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,.05,d),bm);
    m.position.set(px,.025,pz); m.rotation.y=ry; scene.add(m);
  });
}

function buildLights(){
  scene.add(new THREE.AmbientLight(0xFFEED8,1.6));
  const main=new THREE.PointLight(0xFFF5E0,2.5,20); main.position.set(0,2.8,0);
  main.castShadow=true; main.shadow.mapSize.set(1024,1024); main.shadow.bias=-0.001; scene.add(main);
  const fill=new THREE.PointLight(0xFFDDA0,1.0,18); fill.position.set(-2,2.2,-2); scene.add(fill);
  const cam=new THREE.DirectionalLight(0xFFF8F0,.6); cam.position.set(5,7,7); scene.add(cam);
}

/* ═══ GLB LOADING ═══ */
function prog(p,t){
  document.getElementById('lfill').style.width=p+'%';
  document.getElementById('ltxt').textContent=t;
}

/* Name mapping for GLB nodes */
const ROOT_INFO = {
  'Window':    {name:'Pencere',       cat:'Yapı'},
  '扫描':      {name:'Dekor Taş',     cat:'Dekor'},
  'Plane.066': {name:'Halı',          cat:'Zemin'},
  'book':      {name:'Kitaplık',      cat:'Depolama'},
  'tv':        {name:'TV Ünitesi',    cat:'Depolama'},
  'dresser':   {name:'Komodin',       cat:'Depolama'},
  'deng':      {name:'Lamba',         cat:'Dekor'},
  'sofa':      {name:'Kanepe',        cat:'Oturma'},
  'coffee':    {name:'Bardak Dekor',  cat:'Dekor'},
  'coffee.1':  {name:'Bardak Dekor 2',cat:'Dekor'},
  'Plane.001': {name:'Cam Bölme',     cat:'Yapı'},
  '空白.4':    {name:'Perde',         cat:'Dekor'},
  'table':     {name:'Masa',          cat:'Oturma'},
  '圆柱体':    {name:'Sütun',         cat:'Yapı'},
  '立方体.2':  {name:'Kutu C',        cat:'Dekor'},
  '立方体.1':  {name:'Kutu B',        cat:'Dekor'},
  '立方体':    {name:'Kutu A',        cat:'Dekor'},
};

let _kidx = 0;

function extractTemplate(node){
  const meshes=[];
  node.traverse(c=>{
    if(!c.isMesh||!c.geometry) return;
    c.updateWorldMatrix(true,false);
    const geo=c.geometry.clone();
    geo.applyMatrix4(c.matrixWorld);
    geo.computeVertexNormals();
    const srcMat=[c.material].flat();
    const mat=srcMat.map(m=>m.clone());
    const mesh=new THREE.Mesh(geo, mat.length===1?mat[0]:mat);
    mesh.castShadow=mesh.receiveShadow=true;
    meshes.push(mesh);
  });
  if(!meshes.length) return null;
  const grp=new THREE.Group();
  meshes.forEach(m=>grp.add(m));
  const box=new THREE.Box3().setFromObject(grp);
  if(box.isEmpty()) return null;
  const ctr=box.getCenter(new THREE.Vector3());
  const sz=box.getSize(new THREE.Vector3());
  grp.traverse(c=>{
    if(!c.isMesh||!c.geometry) return;
    c.geometry.translate(-ctr.x,-box.min.y,-ctr.z);
  });
  const maxD=Math.max(sz.x,sz.y,sz.z,0.01);
  if(maxD>3) grp.scale.setScalar(3/maxD);
  else if(maxD<0.05) grp.scale.setScalar(0.4/maxD);
  return grp;
}

function registerNode(node, name, cat){
  const key='fi_'+(_kidx++);
  const tmpl=extractTemplate(node);
  if(!tmpl) return;
  templates[key]=tmpl;
  CATALOG.push({key, name, cat, ct:'fabric'});
}

function buildCatalogFromGLB(root){
  root.updateWorldMatrix(true,true);
  root.children.forEach(child=>{
    const n=child.name;
    if(n==='huajia'){
      const shelfNames=['Raf Set A','Raf Set B','Raf Set C','Kitaplık'];
      child.children.forEach((sub,i)=>{
        if(sub.name==='空白.6'){
          const chairNames=['Sandalye A','Sandalye B','Sandalye C','Sandalye D'];
          let ci=0;
          sub.children.forEach(v=>{
            if(v.children&&v.children.length>=3&&ci<chairNames.length)
              registerNode(v,chairNames[ci++],'Oturma');
          });
        } else if(i<shelfNames.length){
          registerNode(sub,shelfNames[i],'Depolama');
        }
      });
    } else if(ROOT_INFO[n]){
      registerNode(child,ROOT_INFO[n].name,ROOT_INFO[n].cat);
    } else if(n){
      registerNode(child,n,'Dekor');
    }
  });
}

async function generateThumbnails(){
  const tc=document.createElement('canvas');
  tc.width=tc.height=128;
  const tr=new THREE.WebGLRenderer({canvas:tc,antialias:true,alpha:false,preserveDrawingBuffer:true});
  tr.setSize(128,128,false);
  tr.outputColorSpace=THREE.SRGBColorSpace;
  tr.toneMapping=THREE.ACESFilmicToneMapping;
  tr.toneMappingExposure=1.2;

  const ts=new THREE.Scene();
  ts.background=new THREE.Color(0xF0EBE5);
  ts.add(new THREE.AmbientLight(0xffffff,3.0));
  const tl1=new THREE.DirectionalLight(0xffffff,2.5); tl1.position.set(2,3,2); ts.add(tl1);
  const tl2=new THREE.DirectionalLight(0xFFF0D0,1.2); tl2.position.set(-2,2,-1); ts.add(tl2);
  const cam=new THREE.PerspectiveCamera(50,1,0.001,1000);

  for(const item of CATALOG){
    const tmpl=templates[item.key]; if(!tmpl) continue;
    const clone=tmpl.clone(true);
    ts.add(clone);
    const box=new THREE.Box3().setFromObject(clone);
    const ctr=box.getCenter(new THREE.Vector3());
    const sz=box.getSize(new THREE.Vector3());
    const maxD=Math.max(sz.x,sz.y,sz.z,0.001);
    const dist=maxD*2.4;
    cam.position.set(ctr.x+dist*.8,ctr.y+dist*.7,ctr.z+dist*.8);
    cam.lookAt(ctr);
    cam.updateProjectionMatrix();
    tr.render(ts,cam);
    const url=tc.toDataURL('image/jpeg',.88);
    const img=document.querySelector(`img[data-key="${item.key}"]`);
    if(img){ img.src=url; img.classList.remove('loading'); }
    ts.remove(clone);
    await new Promise(r=>requestAnimationFrame(r));
  }
  tr.dispose();
}

async function loadAssets(){
  prog(5,'Modeller yükleniyor...');
  try{
    const gltf=await new Promise((res,rej)=>
      new GLTFLoader().load('models/room.glb',res,
        e=>prog(5+Math.round((e.loaded/(e.total||17e6))*72),`${(e.loaded/1e6).toFixed(1)} MB`),rej)
    );
    prog(80,'Katalog oluşturuluyor...');
    buildCatalogFromGLB(gltf.scene);
    buildGrid(); // refresh grid with actual items
    buildTabs();
    prog(88,'Küçük resimler...');
    await generateThumbnails();
    prog(100,'Hazır!');
  }catch(e){
    console.warn('GLB yüklenemedi',e);
    prog(100,'Basit mod');
  }
  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    toast('Mobilya seç → odaya dokun 👆',3000);
  },350);
}

/* ═══ PLACEMENT ═══ */
const ray=new THREE.Raycaster();
const floorPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
let placed=[],selected=null,ghost=null;
let activeKey=null,placing=false;
let history=[];
const snap=v=>Math.round(v*4)/4;

function ndcFromClient(cx,cy){
  const r=renderer.domElement.getBoundingClientRect();
  return new THREE.Vector2(((cx-r.left)/r.width)*2-1,-((cy-r.top)/r.height)*2+1);
}
function floorPoint(cx,cy){
  ray.setFromCamera(ndcFromClient(cx,cy),camera);
  const t=new THREE.Vector3();
  return ray.ray.intersectPlane(floorPlane,t)?t:null;
}

function startPlace(key){
  activeKey=key; placing=true;
  deselect(); removeGhost(); makeGhost(key);
  document.querySelectorAll('.fi').forEach(f=>f.classList.remove('on'));
  document.getElementById('fi_'+key)?.classList.add('on');
  closePanel();
  showHint('Odaya dokun → yerleştir  •  2× → iptal');
}
function cancelPlace(){
  placing=false; activeKey=null; removeGhost();
  document.querySelectorAll('.fi').forEach(f=>f.classList.remove('on'));
  hideHint();
}
function makeGhost(key){
  removeGhost();
  const tmpl=templates[key]; if(!tmpl) return;
  ghost=tmpl.clone(true);
  ghost.traverse(c=>{
    if(!c.isMesh) return;
    const ms=[c.material].flat().map(m=>{const n=m.clone();n.transparent=true;n.opacity=.4;n.depthWrite=false;return n;});
    c.material=ms.length===1?ms[0]:ms;
  });
  ghost.name='__ghost'; scene.add(ghost);
}
function removeGhost(){ if(ghost){scene.remove(ghost);ghost=null;} }

function placeAt(pt){
  const tmpl=templates[activeKey]; if(!tmpl){toast('Model yüklenemedi 😅');return;}
  const item=CATALOG.find(i=>i.key===activeKey);
  const cl=tmpl.clone(true);
  cl.position.set(snap(pt.x),0,snap(pt.z));
  cl.userData={key:activeKey,name:item?.name||activeKey};
  cl.name='placed__'+activeKey+'__'+Date.now();
  cl.traverse(c=>{if(c.isMesh){c.castShadow=c.receiveShadow=true;}});
  scene.add(cl); placed.push(cl);
  history.push({t:'add',o:cl});
  makeGhost(activeKey);
  toast(`${item?.name} eklendi ✓`,1400);
}

/* ═══ SELECTION ═══ */
function trySelect(cx,cy){
  ray.setFromCamera(ndcFromClient(cx,cy),camera);
  const meshes=[]; placed.forEach(o=>o.traverse(c=>{if(c.isMesh)meshes.push(c);}));
  const hits=ray.intersectObjects(meshes,false);
  if(hits.length){
    let r=hits[0].object;
    while(r.parent&&!r.name.startsWith('placed__')) r=r.parent;
    if(placed.includes(r)){doSelect(r);return true;}
  }
  deselect(); return false;
}
function doSelect(obj){
  deselect(); selected=obj;
  obj.traverse(c=>{
    if(!c.isMesh) return;
    c.userData._emissive=[c.material].flat()[0]?.emissive?.clone()||new THREE.Color(0);
    [c.material].flat().forEach(m=>m.emissive?.set(0x221500));
  });
  document.getElementById('actbar').classList.add('show');
}
function deselect(){
  if(!selected) return;
  selected.traverse(c=>{
    if(!c.isMesh||!c.userData._emissive) return;
    [c.material].flat().forEach(m=>m.emissive?.copy(c.userData._emissive));
  });
  selected=null;
  document.getElementById('actbar').classList.remove('show');
  closeColorPanel();
}

/* ═══ TOUCH / POINTER CONTROLS ═══ */
let pStart=null,dragging=false,dragOffset=new THREE.Vector3();
let tapCount=0,tapTimer=null;

const cv=renderer.domElement;

// Pointer events (desktop / Android)
cv.addEventListener('pointerdown',onDown,{passive:false});
cv.addEventListener('pointermove',onMove,{passive:false});
cv.addEventListener('pointerup',  onUp,  {passive:false});
cv.addEventListener('pointercancel',()=>{pStart=null;dragging=false;},{passive:false});

// Touch events — iOS Safari
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(!e.touches.length) return;
  const t=e.touches[0];
  onDown({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>{}});
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!e.touches.length) return;
  const t=e.touches[0];
  onMove({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>{}});
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!e.changedTouches.length) return;
  const t=e.changedTouches[0];
  onUp({clientX:t.clientX,clientY:t.clientY,preventDefault:()=>{}});
},{passive:false});
cv.addEventListener('touchcancel',()=>{pStart=null;dragging=false;},{passive:false});

function onDown(e){
  e.preventDefault?.();
  pStart={x:e.clientX,y:e.clientY,t:Date.now()};
  dragging=false;
  if(selected&&!placing){
    const ndc=ndcFromClient(e.clientX,e.clientY);
    ray.setFromCamera(ndc,camera);
    const ms=[]; selected.traverse(c=>{if(c.isMesh)ms.push(c);});
    if(ray.intersectObjects(ms,false).length){
      const fp=floorPoint(e.clientX,e.clientY);
      if(fp){dragOffset.copy(selected.position).sub(fp);dragging=true;}
    }
  }
}
function onMove(e){
  e.preventDefault?.();
  if(!pStart) return;
  const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y;
  const moved=Math.sqrt(dx*dx+dy*dy)>8;
  if(placing&&ghost){
    const fp=floorPoint(e.clientX,e.clientY);
    if(fp) ghost.position.set(snap(fp.x),0,snap(fp.z));
    return;
  }
  if(dragging&&selected&&moved){
    const fp=floorPoint(e.clientX,e.clientY);
    if(fp){selected.position.x=snap(fp.x+dragOffset.x);selected.position.z=snap(fp.z+dragOffset.z);}
  }
}
function onUp(e){
  e.preventDefault?.();
  if(!pStart) return;
  const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y;
  const moved=Math.sqrt(dx*dx+dy*dy)>10;
  const dt=Date.now()-pStart.t;
  const wasDragging=dragging;
  dragging=false; pStart=null;
  if(wasDragging||moved||dt>400) return;
  if(placing){
    tapCount++;
    clearTimeout(tapTimer);
    if(tapCount>=2){tapCount=0;cancelPlace();return;}
    tapTimer=setTimeout(()=>tapCount=0,380);
    const fp=floorPoint(e.clientX,e.clientY);
    if(fp) placeAt(fp);
    return;
  }
  trySelect(e.clientX,e.clientY);
}

/* ═══ ACTION BUTTONS ═══ */
document.getElementById('act-rot').onclick=()=>{if(selected)selected.rotation.y+=Math.PI/2;};
document.getElementById('act-dup').onclick=()=>{
  if(!selected) return;
  const cl=selected.clone(true);
  cl.position.set(selected.position.x+0.7,0,selected.position.z);
  cl.userData={...selected.userData};
  cl.name=selected.name+'_dup';
  scene.add(cl); placed.push(cl);
  history.push({t:'add',o:cl});
  doSelect(cl);
};
document.getElementById('act-del').onclick=()=>{
  if(!selected) return;
  scene.remove(selected);
  placed.splice(placed.indexOf(selected),1);
  history.push({t:'del',o:selected});
  deselect();
};
document.getElementById('act-color').onclick=openColorPanel;

document.getElementById('btn-ss').onclick=()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.href=renderer.domElement.toDataURL('image/png');
  a.download='makeroom.png'; a.click();
  toast('Fotoğraf kaydedildi 📸',2000);
};
document.getElementById('btn-room').onclick=()=>document.getElementById('roompanel').classList.add('open');
document.getElementById('rph-close').onclick=()=>document.getElementById('roompanel').classList.remove('open');

/* ═══ COLOR PANEL ═══ */
let activePalIdx=0;
function openColorPanel(){
  if(!selected) return;
  const item=CATALOG.find(i=>i.key===selected.userData.key);
  const pals=PAL[item?.ct||'fabric']||PAL.fabric;
  const tabEl=document.getElementById('ctabs');
  const colEl=document.getElementById('ccolors');
  tabEl.innerHTML=''; colEl.innerHTML='';
  activePalIdx=0;
  pals.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='ctab'+(i===0?' on':'');
    b.textContent=p.n;
    b.onclick=()=>{
      activePalIdx=i;
      tabEl.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
      b.classList.add('on');
      renderColors(pals[i].c);
    };
    tabEl.appendChild(b);
  });
  renderColors(pals[0].c);
  document.getElementById('colorpanel').classList.add('open');
}
function renderColors(colors){
  const el=document.getElementById('ccolors'); el.innerHTML='';
  colors.forEach(hex=>{
    const d=document.createElement('div');
    d.className='cc'; d.style.background=hex;
    d.onclick=()=>{
      if(!selected) return;
      el.querySelectorAll('.cc').forEach(c=>c.classList.remove('on'));
      d.classList.add('on');
      selected.traverse(c=>{
        if(!c.isMesh) return;
        [c.material].flat().forEach(m=>m.color?.set(hex));
      });
    };
    el.appendChild(d);
  });
}
function closeColorPanel(){document.getElementById('colorpanel').classList.remove('open');}
document.getElementById('cph-close').onclick=closeColorPanel;

/* ═══ ROOM SWATCHES ═══ */
function makeSwatch(id,colors,onChange){
  const el=document.getElementById(id);
  colors.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='swatch'+(i===0?' on':'');
    d.style.background=c;
    d.onclick=()=>{
      el.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
      d.classList.add('on'); onChange(c);
    };
    el.appendChild(d);
  });
}

/* ═══ PANEL / UI ═══ */
let panelOpen=false,activeCat='Tümü';

function buildTabs(){
  const cats=['Tümü',...new Set(CATALOG.map(i=>i.cat))];
  const tabEl=document.getElementById('ptabs'); tabEl.innerHTML='';
  cats.forEach(cat=>{
    const b=document.createElement('button');
    b.className='ptab'+(cat==='Tümü'?' on':'');
    b.textContent=cat;
    b.onclick=()=>{
      activeCat=cat;
      tabEl.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
      b.classList.add('on');
      buildGrid();
    };
    tabEl.appendChild(b);
  });
}

function buildGrid(){
  const el=document.getElementById('fgrid'); el.innerHTML='';
  const items=CATALOG.filter(i=>activeCat==='Tümü'||i.cat===activeCat);
  items.forEach(item=>{
    const d=document.createElement('div');
    d.className='fi'; d.id='fi_'+item.key;
    d.innerHTML=`<img class="fi-thumb loading" data-key="${item.key}" alt="${item.name}"><div class="fn">${item.name}</div>`;
    d.onclick=()=>startPlace(item.key);
    el.appendChild(d);
  });
}

function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('panel').classList.toggle('open',panelOpen);
  if(panelOpen) deselect();
}
function closePanel(){panelOpen=false;document.getElementById('panel').classList.remove('open');}

document.getElementById('panel-toggle').onclick=togglePanel;

cv.addEventListener('click',e=>{
  const panelY=window.innerHeight-parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-peek'));
  if(e.clientY>panelY&&!panelOpen&&!placing) togglePanel();
},false);

/* ═══ KEYBOARD ═══ */
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){placing?cancelPlace():deselect();}
  if(e.key==='r'&&selected) selected.rotation.y+=Math.PI/2;
  if((e.metaKey||e.ctrlKey)&&e.key==='z'){
    const ev=history.pop(); if(!ev) return;
    if(ev.t==='add'){scene.remove(ev.o);placed.splice(placed.indexOf(ev.o),1);if(selected===ev.o)deselect();}
    else{scene.add(ev.o);placed.push(ev.o);}
    toast('Geri alındı',1000);
  }
});

/* ═══ TOAST / HINT ═══ */
let _toastTmr;
function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.toggle('on',!!msg);
  clearTimeout(_toastTmr);
  if(msg&&dur) _toastTmr=setTimeout(()=>el.classList.remove('on'),dur);
}
function showHint(msg){const h=document.getElementById('hint');h.textContent=msg;h.classList.add('show');}
function hideHint(){document.getElementById('hint').classList.remove('show');}

/* ═══ RESIZE ═══ */
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ═══ RENDER LOOP ═══ */
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}

/* ═══ INIT ═══ */
buildRoom();
buildLights();
// Build initial empty UI (tabs + grid filled after GLB loads)
const initTabEl=document.getElementById('ptabs');
const b=document.createElement('button');
b.className='ptab on'; b.textContent='Tümü'; initTabEl.appendChild(b);
makeSwatch('sw-wall', WALL_SW, c=>{mats.wall.color.set(c);});
makeSwatch('sw-floor',FLOOR_SW,c=>{mats.floor.color.set(c);});
animate();
loadAssets();
</script>
