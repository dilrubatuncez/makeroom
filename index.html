<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Make Room</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --a:#e8856a;--a2:#d4705a;
  --panel:rgba(255,255,255,0.96);
  --bg:#f0ebe4;--tx:#2d2420;--tx2:#9a8878;--bd:#e0d5cc;
  --r:16px;--sh:0 8px 32px rgba(0,0,0,.16);
}
html,body{width:100%;height:100%;overflow:hidden;background:#b8ccd8;font-family:-apple-system,'Segoe UI',sans-serif;touch-action:none}
canvas{position:fixed;inset:0;display:block}

/* ── Top HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;gap:8px;
  padding:max(14px,env(safe-area-inset-top)) 14px 8px;pointer-events:none}
.pill{background:var(--panel);backdrop-filter:blur(14px);border-radius:24px;
  padding:8px 14px;box-shadow:var(--sh);font-size:13px;font-weight:700;
  pointer-events:all;cursor:pointer;border:none;color:var(--tx);
  display:flex;align-items:center;gap:5px;transition:transform .12s;white-space:nowrap}
.pill:active{transform:scale(.92)}
.logo{font-size:15px;font-weight:900;color:var(--a);background:var(--panel);
  backdrop-filter:blur(14px);border-radius:24px;padding:8px 14px;box-shadow:var(--sh);pointer-events:none}
.logo b{color:var(--tx)}
.sp{flex:1}

/* ── Selection overlay (top) ── */
#sel-bar{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;gap:8px;align-items:center;justify-content:center;
  padding:max(14px,env(safe-area-inset-top)) 14px 8px;flex-wrap:wrap;
  transform:translateY(-200%);transition:transform .3s cubic-bezier(.32,1.2,.42,1)}
#sel-bar.show{transform:translateY(0)}
.sbtn{background:var(--panel);backdrop-filter:blur(14px);border-radius:24px;
  padding:8px 16px;box-shadow:var(--sh);font-size:13px;font-weight:700;
  border:none;cursor:pointer;color:var(--tx);transition:transform .1s;white-space:nowrap}
.sbtn:active{transform:scale(.9)}
.sbtn.acc{background:var(--a);color:#fff}
.sbtn.del{color:#e33}

/* ── Place ring ── */
#ring{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:20;opacity:0;transition:opacity .3s}
#ring.on{opacity:1}
.ring-inner{width:62px;height:62px;border-radius:50%;
  border:3px solid var(--a);background:rgba(232,133,106,.15);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ── Bottom Nav ── */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--panel);backdrop-filter:blur(16px);
  border-top:1px solid var(--bd);
  display:flex;justify-content:space-around;
  padding:6px 0 max(10px,env(safe-area-inset-bottom));
  box-shadow:0 -2px 20px rgba(0,0,0,.08)}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;padding:5px 12px;
  color:var(--tx2);font-size:10px;font-weight:600;transition:color .15s;flex:1}
.nb .i{font-size:22px;line-height:1}
.nb.on{color:var(--a)}
.nb:active{opacity:.6}

/* ── Furniture Sheet ── */
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:39;
  background:var(--panel);backdrop-filter:blur(16px);
  border-radius:24px 24px 0 0;
  box-shadow:0 -4px 40px rgba(0,0,0,.14);
  transition:transform .35s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(10px,env(safe-area-inset-bottom))}
#sheet.hide{transform:translateY(calc(100% - 72px))}
.sh-bar{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:10px auto 0;cursor:pointer}
.sh-head{display:flex;align-items:center;padding:7px 16px 5px;cursor:pointer;gap:8px}
.sh-title{font-size:14px;font-weight:800;color:var(--tx)}
.sh-sub{font-size:11px;color:var(--tx2);margin-left:auto}
#cats{display:flex;gap:6px;padding:0 14px 9px;overflow-x:auto;scrollbar-width:none}
#cats::-webkit-scrollbar{display:none}
.cat{padding:5px 13px;border-radius:20px;border:1.5px solid var(--bd);
  font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;
  background:transparent;color:var(--tx2);transition:all .14s;flex-shrink:0}
.cat.on{background:var(--a);color:#fff;border-color:var(--a)}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:0 14px 10px;max-height:220px;overflow-y:auto;scrollbar-width:none}
#grid::-webkit-scrollbar{display:none}
.fi{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 8px;border-radius:12px;background:#f8f4f0;
  cursor:pointer;border:2px solid transparent;transition:all .13s;user-select:none}
.fi:active{transform:scale(.88)}
.fi.on{border-color:var(--a);background:#fff5f0;box-shadow:0 0 0 3px rgba(232,133,106,.2)}
.fi .e{font-size:28px;line-height:1}
.fi .n{font-size:9px;font-weight:600;color:var(--tx2);text-align:center;line-height:1.3}

/* ── Room Sheet ── */
#rsheet{position:fixed;left:0;right:0;bottom:0;z-index:38;
  background:var(--panel);backdrop-filter:blur(16px);
  border-radius:24px 24px 0 0;box-shadow:0 -4px 40px rgba(0,0,0,.14);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(10px,env(safe-area-inset-bottom));max-height:70vh;overflow-y:auto}
#rsheet.open{transform:translateY(0)}
.rsh{display:flex;align-items:center;padding:14px 16px 8px}
.rsh h3{font-size:16px;font-weight:800;color:var(--tx)}
.rx{margin-left:auto;background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;padding:4px}
.rl{padding:0 16px 14px}
.rlb{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.swrow{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:8px;cursor:pointer;
  border:2.5px solid transparent;transition:all .12s;box-shadow:0 1px 4px rgba(0,0,0,.14);flex-shrink:0}
.sw:active{transform:scale(.82)}
.sw.on{border-color:var(--a);box-shadow:0 0 0 3px rgba(232,133,106,.32)}
.div{height:1px;background:var(--bd);margin:0 16px 14px}

/* ── Color Sheet (furniture) ── */
#csheet{position:fixed;left:0;right:0;bottom:0;z-index:41;
  background:var(--panel);backdrop-filter:blur(16px);
  border-radius:24px 24px 0 0;box-shadow:0 -4px 40px rgba(0,0,0,.2);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1.2,.42,1);
  padding-bottom:max(10px,env(safe-area-inset-bottom))}
#csheet.open{transform:translateY(0)}
.csh{display:flex;align-items:center;padding:14px 16px 8px}
.csh h3{font-size:15px;font-weight:800;color:var(--tx)}
.csh-close{margin-left:auto;background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;padding:4px}
.ctab-row{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none}
.ctab{padding:5px 12px;border-radius:16px;border:1.5px solid var(--bd);font-size:11px;
  font-weight:700;cursor:pointer;background:transparent;color:var(--tx2);white-space:nowrap;transition:all .13s}
.ctab.on{background:var(--a);color:#fff;border-color:var(--a)}
#cpal{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 14px}
.cp{width:38px;height:38px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;
  box-shadow:0 1px 4px rgba(0,0,0,.18);transition:all .12s;flex-shrink:0}
.cp:active{transform:scale(.82)}
.cp.on{border-color:var(--a);box-shadow:0 0 0 3px rgba(232,133,106,.35)}

/* ── Toast ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);
  background:rgba(30,20,15,.82);color:#fff;padding:9px 20px;border-radius:20px;
  font-size:13px;font-weight:600;pointer-events:none;z-index:60;
  opacity:0;transition:all .28s;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
#ld{position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.spin{width:46px;height:46px;border:4px solid var(--bd);border-top-color:var(--a);
  border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#ld h2{font-size:22px;font-weight:900;color:var(--tx)}
#ld p{font-size:13px;color:var(--tx2)}
.bar{width:200px;height:5px;border-radius:3px;background:var(--bd);overflow:hidden}
.fill{height:100%;background:var(--a);width:0%;transition:width .3s;border-radius:3px}
</style>
</head>
<body>

<div id="ld">
  <div class="spin"></div>
  <h2>Make Room</h2>
  <p id="ltxt">Modeller yükleniyor...</p>
  <div class="bar"><div class="fill" id="lfill"></div></div>
</div>

<canvas id="cv"></canvas>

<!-- Top HUD -->
<div id="hud">
  <div class="logo">Make<b>Room</b></div>
  <div class="sp"></div>
  <button class="pill" onclick="window.undoLast()">↩ Geri</button>
  <button class="pill" onclick="window.snap2screenshot()">📸</button>
</div>

<!-- Selection Bar -->
<div id="sel-bar">
  <button class="sbtn acc" onclick="window.openColorSheet()">🎨 Renk</button>
  <button class="sbtn" onclick="window.rotateSelected(90)">↻ Döndür</button>
  <button class="sbtn" onclick="window.duplicateSelected()">⎘ Kopyala</button>
  <button class="sbtn del" onclick="window.deleteSelected()">✕ Sil</button>
</div>

<!-- Place Ring -->
<div id="ring"><div class="ring-inner">👆</div></div>

<!-- Bottom Nav -->
<div id="nav">
  <button class="nb on" id="nav-f" onclick="showSheet('f')">
    <span class="i">🛋️</span>Mobilyalar
  </button>
  <button class="nb" id="nav-r" onclick="showSheet('r')">
    <span class="i">🎨</span>Oda
  </button>
  <button class="nb" id="nav-cam" onclick="window.resetCamera()">
    <span class="i">📷</span>Kamera
  </button>
  <button class="nb" id="nav-u" onclick="window.clearRoom()">
    <span class="i">🗑️</span>Temizle
  </button>
</div>

<!-- Furniture Sheet -->
<div id="sheet" class="hide">
  <div class="sh-bar" onclick="toggleSheet()"></div>
  <div class="sh-head" onclick="toggleSheet()">
    <div class="sh-title">🛋️ Mobilya Kataloğu</div>
    <div class="sh-sub" id="sh-sub">Seç ve yerleştir</div>
  </div>
  <div id="cats"></div>
  <div id="grid"></div>
</div>

<!-- Room Sheet -->
<div id="rsheet">
  <div class="rsh"><h3>🏠 Oda Tasarımı</h3><button class="rx" onclick="hideRsheet()">✕</button></div>
  <div class="rl"><div class="rlb">Duvar Rengi</div><div class="swrow" id="sw-w"></div></div>
  <div class="div"></div>
  <div class="rl"><div class="rlb">Zemin</div><div class="swrow" id="sw-f"></div></div>
  <div class="div"></div>
  <div class="rl"><div class="rlb">Tavan</div><div class="swrow" id="sw-c"></div></div>
</div>

<!-- Furniture Color Sheet -->
<div id="csheet">
  <div class="csh"><h3>🎨 Renk Değiştir</h3><button class="csh-close" onclick="closeCsheet()">✕</button></div>
  <div class="ctab-row" id="ctabs"></div>
  <div id="cpal"></div>
</div>

<div id="toast"></div>

<script type="importmap">

// Room color palettes
const WALL_C  = ['#ffffff','#fdf6e3','#fff0e8','#f9d6c8','#f0d0d8','#dcc8dc','#c0ccdc','#c8dcd0','#b8d0b8','#8a9aaa','#4a3828','#1e1e2e'];
const FLOOR_C = ['#f5f0e8','#e8d8c0','#d4b898','#c0a080','#a88060','#c8c0b0','#989080','#808878','#8a7060','#504030','#302010','#1a1210'];

// Furniture color palettes by type
const COLOR_PALETTES = {

// ── STATE ─────────────────────────────────────────────────────────────────────
let renderer, scene, camera, controls;

let placed=[], selected=null, ghost=null, activeKey=null, placing=false, history=[];

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x8aaabb);
  scene.fog = new THREE.Fog(0x8aaabb, 20, 35);

  const W = window.innerWidth, H = window.innerHeight;
  camera = new THREE.PerspectiveCamera(65, W/H, 0.05, 60);
  // Classic Make Room diorama — camera at eye level inside room, facing back-left corner
  // Room is 8x8x3.2 — camera must be below y=3.2 (ceiling)
  camera.position.set(3.8, 1.8, 3.8);
  camera.lookAt(-2, 0.8, -2);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(-2, 0.8, -2);
  controls.minDistance = 3;
  controls.maxDistance = 18;
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.maxPolarAngle = Math.PI / 2.05;
  controls.touches = {ONE:THREE.TOUCH.ROTATE, TWO:THREE.TOUCH.DOLLY_PAN};
  controls.update();

  buildRoom();
  buildLights();
  buildUI();

  window.addEventListener('resize', onResize);
  onResize();

  const cv = renderer.domElement;
  cv.addEventListener('pointerdown', onPtrDown);
  cv.addEventListener('pointermove', onPtrMove);
  cv.addEventListener('pointerup',   onPtrUp);
  window.addEventListener('keydown', onKey);

  loadOBJ();
  animate();
}

// ── ROOM ──────────────────────────────────────────────────────────────────────
const ROOM_W=8, ROOM_H=3.2, ROOM_D=8;

function buildRoom(){
  const W=ROOM_W, H=ROOM_H, D=ROOM_D;
  mats.floor = new THREE.MeshStandardMaterial({color:0xd4b898,roughness:.82,metalness:.02,side:THREE.DoubleSide});
  mats.wall  = new THREE.MeshStandardMaterial({color:0xfdf6e3,roughness:.9,metalness:0,side:THREE.DoubleSide});
  mats.ceil  = new THREE.MeshStandardMaterial({color:0xffffff,roughness:.85,metalness:0,side:THREE.DoubleSide});

  // Floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D), mats.floor);
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; floor.name='__floor'; scene.add(floor);

  // Back wall (faces +z — toward the camera which is at +z)
  const bw = new THREE.Mesh(new THREE.PlaneGeometry(W,H), mats.wall);
  bw.position.set(0,H/2,-D/2); bw.receiveShadow=true; bw.name='__bwall'; scene.add(bw);

  // Left wall (faces +x — toward camera at +x side)
  const lw = new THREE.Mesh(new THREE.PlaneGeometry(D,H), mats.wall);
  lw.position.set(-W/2,H/2,0); lw.rotation.y=Math.PI/2; lw.receiveShadow=true; lw.name='__lwall'; scene.add(lw);

  // Right wall (faces -x)
  const rw = new THREE.Mesh(new THREE.PlaneGeometry(D,H), mats.wall);
  rw.position.set(W/2,H/2,0); rw.rotation.y=-Math.PI/2; rw.receiveShadow=true; rw.name='__rwall'; scene.add(rw);

  // Ceiling (faces downward, visible from inside)
  const cm = new THREE.Mesh(new THREE.PlaneGeometry(W,D), mats.ceil);
  cm.rotation.x=Math.PI/2; cm.position.y=H; cm.name='__ceil'; scene.add(cm);

  // Baseboard trim (thin dark strip at wall base)
  const trimMat = new THREE.MeshStandardMaterial({color:0xe8d8c8,roughness:.9});
  [[0,0,-D/2,W,.06,0],[0,0,D/2,W,.06,0],[-W/2,0,0,D,.06,Math.PI/2],[W/2,0,0,D,.06,Math.PI/2]].forEach(([x,y,z,w,h,ry])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,.04),trimMat);
    m.position.set(x,.03,z); m.rotation.y=ry; scene.add(m);
  });

  // Grid helper (subtle)
  const g=new THREE.GridHelper(W,16,0xc8b8a8,0xddd0c4);
  g.position.y=.003; g.name='__grid'; scene.add(g);
}

function buildLights(){
  // Warm ambient base
  scene.add(new THREE.AmbientLight(0xfff5e0, 1.2));

  // Main overhead light (ceiling fixture position)
  const ceil = new THREE.PointLight(0xfffae8, 1.8, 16);
  ceil.position.set(0, 3.0, 0);
  ceil.castShadow = true;
  ceil.shadow.mapSize.set(1024,1024);
  ceil.shadow.bias = -0.001;
  scene.add(ceil);

  // Warm fill from back-left corner (bounces off walls)
  const fl = new THREE.PointLight(0xffe8c8, 0.7, 18);
  fl.position.set(-2, 2.0, -2); scene.add(fl);

  // Cool daylight from front window (camera direction)
  const win = new THREE.DirectionalLight(0xe8f0ff, 0.5);
  win.position.set(4, 6, 6); scene.add(win);

  // Subtle rim from back-right
  const rim = new THREE.PointLight(0xfff0d8, 0.3, 12);
  rim.position.set(3, 2.5, -3); scene.add(rim);
}

// ── OBJ LOAD ──────────────────────────────────────────────────────────────────
function setProgress(p,t){
  document.getElementById('lfill').style.width=p+'%';
  document.getElementById('ltxt').textContent=t;
}

async function loadOBJ(){
  setProgress(5,'furniture.obj yükleniyor...');
  try{
    const obj = await new Promise((res,rej)=>
      new OBJLoader().load('models/furniture.obj', res,
        e=>setProgress(5+Math.round((e.loaded/(e.total||38e6))*70),
          `${Math.round((e.loaded||0)/1024)} KB yüklendi`),
        rej)
    );
    setProgress(80,'Modeller işleniyor...');
    parseOBJ(obj);
    setProgress(100,'Hazır!');
  } catch(e){
    console.warn('OBJ yüklenemedi, alternatif geometriler kullanılıyor.',e);
    buildFallback();
    setProgress(100,'Hazır (basit mod)');
  }
  setTimeout(()=>{
    document.getElementById('ld').style.display='none';
    showToast('Mobilya seç → odaya dokun 👆',3500);
  },400);
}

function parseOBJ(root){
  const byName={};
  root.traverse(c=>{
    if(c.name) byName[c.name]=c;
    if(c.isMesh){
      c.castShadow=true; c.receiveShadow=true;
      ([c.material].flat()).forEach(m=>{
        m.roughness=.8; m.metalness=.05;
      });
    }
  });

  CATALOG.forEach(item=>{
    const grp=new THREE.Group(); grp.name=item.key;
    let found=0;
    item.o.forEach(n=>{
      const src=byName[n]; if(!src) return;
      const cl=src.clone(true);
      cl.traverse(c=>{
        if(!c.isMesh) return;
        c.castShadow=true; c.receiveShadow=true;
        ([c.material].flat()).forEach(m=>{m.roughness=.8;m.metalness=.05;});
      });
      grp.add(cl); found++;
    });
    if(!found) return;

    // Get bounding box, center geometry at origin, floor at y=0
    const box=new THREE.Box3().setFromObject(grp);
    const ctr=box.getCenter(new THREE.Vector3());
    const sz=box.getSize(new THREE.Vector3());
    const minY=box.min.y;

    grp.traverse(c=>{
      if(!c.isMesh||!c.geometry) return;
      const geo=c.geometry.clone();
      geo.translate(-ctr.x,-minY,-ctr.z);
      c.geometry=geo;
    });

    // Scale to 2.5 units max footprint
    const footprint=Math.max(sz.x,sz.z,.1);
    const scale=Math.min(2.5/footprint,1.2);
    grp.scale.setScalar(scale);
    templates[item.key]=grp;
  });
}

function buildFallback(){
  const defs={
    sofa:    ()=>mkBox(2.2,.72,.95,0xc8886a),
    cushion: ()=>mkBox(.5,.22,.4,0xe8a880),
    armchair:()=>mkBox(1.0,.7,.9,0xb87860),
    tv:      ()=>{const g=new THREE.Group();g.add(mkBox(1.8,.06,.42,0x3a3030));const s=mkBox(1.6,.9,.06,0x222222);s.position.set(0,.51,.18);g.add(s);return g;},
    table:   ()=>mkBox(.9,.52,.9,0xb89060),
    shelf:   ()=>mkBox(.9,.6,.32,0x9a7848),
    bookcase:()=>mkBox(1.2,1.8,.32,0xa88050),
    box_a:   ()=>mkBox(.6,.8,.6,0xa09080),
    box_b:   ()=>mkBox(.6,.8,.6,0x908070),
    curtain: ()=>mkBox(.08,2.4,1.2,0xd4a888),
    window:  ()=>mkBox(.08,1.4,1.0,0xc8dde8),
    cactus:  ()=>{const g=new THREE.Group();g.add(mkBox(.22,.8,.22,0x6a9860));return g;},
    plant:   ()=>mkBox(.45,.9,.45,0x70a870),
    rug_r:   ()=>mkBox(2.2,.04,1.5,0xc84040),
    rug_b:   ()=>mkBox(2.2,.04,1.5,0x9a7040),
    deco_a:  ()=>mkBox(.4,.4,.1,0x8ab8c8),
    deco_b:  ()=>mkBox(.3,.22,.3,0xe8d060),
    deco_c:  ()=>mkBox(.4,.4,.4,0x6080c8),
    deco_set:()=>mkBox(.55,.55,.2,0xe8c080),
    col_a:   ()=>mkCyl(.15,1.2,0xe0d8c0),
    col_b:   ()=>mkCyl(.12,1.0,0xd0c8b0),
    poly:    ()=>mkBox(.6,.6,.6,0xd0b890),
  };
  Object.entries(defs).forEach(([k,fn])=>{
    const val=fn();
    const g=val instanceof THREE.Group?val:(()=>{const g=new THREE.Group();g.add(val);return g;})();
    g.name=k; templates[k]=g;
  });
}
function mkBox(w,h,d,c=0xccbbaa){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:c,roughness:.8}));
  m.castShadow=m.receiveShadow=true; m.position.y=h/2; return m;
}
function mkCyl(r,h,c=0xccbbaa){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,16),new THREE.MeshStandardMaterial({color:c,roughness:.8}));
  m.castShadow=m.receiveShadow=true; m.position.y=h/2; return m;
}

// ── UI ────────────────────────────────────────────────────────────────────────
function buildUI(){
  // Category tabs
  const cEl=document.getElementById('cats');
  ALL_CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat'+(cat==='Tümü'?' on':'');
    b.textContent=cat;
    b.onclick=()=>{
      activeCat=cat;
      cEl.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      buildGrid();
    };
    cEl.appendChild(b);
  });
  buildGrid();

  // Room swatches
  makeSwatch('sw-w', WALL_C,  c=>{ mats.wall.color.set(c); });
  makeSwatch('sw-f', FLOOR_C, c=>{ mats.floor.color.set(c); });
  makeSwatch('sw-c', CEIL_C,  c=>{ mats.ceil.color.set(c); });
}

function buildGrid(){
  const el=document.getElementById('grid'); el.innerHTML='';
  CATALOG.filter(i=>activeCat==='Tümü'||i.cat===activeCat).forEach(item=>{
    const d=document.createElement('div');
    d.className='fi'; d.id='fi_'+item.key;
    d.innerHTML=`<div class="e">${item.e}</div><div class="n">${item.name}</div>`;
    d.onclick=()=>startPlace(item.key);
    el.appendChild(d);
  });
}

function makeSwatch(id, cols, cb){
  const el=document.getElementById(id);
  cols.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='sw'+(i===0?' on':'');
    s.style.background=c;
    s.onclick=()=>{
      el.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));
      s.classList.add('on'); cb(c);
    };
    el.appendChild(s);
  });
}

// ── FURNITURE COLOR SHEET ─────────────────────────────────────────────────────
function buildColorSheet(item){
  const palettes = COLOR_PALETTES[item.colorType] || COLOR_PALETTES.wood;
  const tabEl = document.getElementById('ctabs');
  const palEl = document.getElementById('cpal');
  tabEl.innerHTML=''; palEl.innerHTML='';
  activeCTab=0;

  palettes.forEach((pal,i)=>{
    const b=document.createElement('button');
    b.className='ctab'+(i===0?' on':'');
    b.textContent=pal.name;
    b.onclick=()=>{
      activeCTab=i;
      tabEl.querySelectorAll('.ctab').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      renderPalColors(palettes[i].colors);
    };
    tabEl.appendChild(b);
  });
  renderPalColors(palettes[0].colors);
}

function renderPalColors(colors){
  const palEl=document.getElementById('cpal'); palEl.innerHTML='';
  colors.forEach(c=>{
    const d=document.createElement('div');
    d.className='cp'; d.style.background=c;
    d.onclick=()=>{
      if(!selected) return;
      palEl.querySelectorAll('.cp').forEach(x=>x.classList.remove('on'));
      d.classList.add('on');
      applyColorToFurniture(selected, c);
    };
    palEl.appendChild(d);
  });
}

function applyColorToFurniture(obj, hex){
  obj.traverse(c=>{
    if(!c.isMesh) return;
    ([c.material].flat()).forEach(m=>{
      m.color.set(hex);
    });
  });
}

window.openColorSheet=function(){
  if(!selected) return;
  const item=CATALOG.find(i=>i.key===selected.userData.key);
  if(!item) return;
  buildColorSheet(item);
  document.getElementById('csheet').classList.add('open');
};
window.closeCsheet=function(){
  document.getElementById('csheet').classList.remove('open');
};
function closeCsheet(){ window.closeCsheet(); }

// ── SHEETS ────────────────────────────────────────────────────────────────────
window.showSheet=function(which){
  if(which==='f'){
    document.getElementById('rsheet').classList.remove('open');
    document.getElementById('csheet').classList.remove('open');
    sheetOpen=true;
    document.getElementById('sheet').classList.remove('hide');
    setNav('nav-f');
  } else {
    document.getElementById('sheet').classList.add('hide'); sheetOpen=false;
    document.getElementById('csheet').classList.remove('open');
    document.getElementById('rsheet').classList.add('open');
    setNav('nav-r');
  }
};
window.toggleSheet=function(){
  sheetOpen=!sheetOpen;
  document.getElementById('sheet').classList.toggle('hide',!sheetOpen);
};
window.hideRsheet=function(){ document.getElementById('rsheet').classList.remove('open'); };
function hideRsheet(){ window.hideRsheet(); }
function toggleSheet(){ window.toggleSheet(); }
function setNav(id){ document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on')); document.getElementById(id)?.classList.add('on'); }

// ── PLACING ───────────────────────────────────────────────────────────────────
function startPlace(key){
  activeKey=key; placing=true;
  controls.enabled=false;
  document.querySelectorAll('.fi').forEach(e=>e.classList.remove('on'));
  document.getElementById('fi_'+key)?.classList.add('on');
  deselect(); removeGhost(); makeGhost(key);
  document.getElementById('ring').classList.add('on');
  document.getElementById('sh-sub').textContent='📍 Odaya dokun  |  2× → çıkış';
  document.getElementById('sheet').classList.add('hide'); sheetOpen=false;
  showToast('Odaya dokun → mobilyayı yerleştir',3000);
}
function cancelPlace(){
  placing=false; activeKey=null; controls.enabled=true; removeGhost();
  document.getElementById('ring').classList.remove('on');
  document.getElementById('sh-sub').textContent='Seç ve yerleştir';
  document.querySelectorAll('.fi').forEach(e=>e.classList.remove('on'));
}
function makeGhost(key){
  removeGhost();
  const tmpl=templates[key]; if(!tmpl) return;
  ghost=tmpl.clone();
  ghost.traverse(c=>{
    if(!c.isMesh) return;
    const mm=([c.material].flat()).map(m=>{const n=m.clone();n.transparent=true;n.opacity=.4;return n;});
    c.material=mm.length===1?mm[0]:mm;
  });
  ghost.name='__ghost'; scene.add(ghost);
}
function removeGhost(){ if(ghost){scene.remove(ghost);ghost=null;} }

function placeAt(pt){
  const tmpl=templates[activeKey]; if(!tmpl){showToast('Model henüz yüklenmedi 😅');return;}
  const item=CATALOG.find(i=>i.key===activeKey);
  const cl=tmpl.clone();
  cl.position.set(snap(pt.x),0,snap(pt.z));
  cl.userData={key:activeKey, name:item?.name||activeKey};
  cl.name='placed_'+activeKey+'_'+Date.now();
  cl.traverse(c=>{if(c.isMesh){c.castShadow=c.receiveShadow=true;}});
  scene.add(cl); placed.push(cl); history.push({t:'add',o:cl});
  makeGhost(activeKey);
  showToast(`${item?.name} eklendi ✓`,1400);
}

// ── SELECTION ─────────────────────────────────────────────────────────────────
function doSelect(obj){
  deselect(); selected=obj;
  obj.traverse(c=>{
    if(!c.isMesh) return;
    c.userData._oe=([c.material].flat())[0]?.emissive?.clone()||new THREE.Color(0);
    ([c.material].flat()).forEach(m=>m.emissive?.set(0x221500));
  });
  document.getElementById('sel-bar').classList.add('show');
}
function deselect(){
  if(!selected) return;
  selected.traverse(c=>{
    if(!c.isMesh||!c.userData._oe) return;
    ([c.material].flat()).forEach(m=>m.emissive?.copy(c.userData._oe));
  });
  selected=null;
  document.getElementById('sel-bar').classList.remove('show');
  window.closeCsheet();
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.rotateSelected=deg=>{ if(selected) selected.rotation.y+=deg*Math.PI/180; };
window.duplicateSelected=()=>{
  if(!selected) return;
  const c=selected.clone(); c.position.x+=0.7;
  c.userData={...selected.userData};
  c.name=selected.name+'_dup';
  scene.add(c); placed.push(c);
  history.push({t:'add',o:c}); doSelect(c);
};
window.deleteSelected=()=>{
  if(!selected) return;
  scene.remove(selected); placed.splice(placed.indexOf(selected),1);
  history.push({t:'del',o:selected}); deselect();
};
window.undoLast=()=>{
  const e=history.pop(); if(!e) return;
  if(e.t==='add'){scene.remove(e.o);placed.splice(placed.indexOf(e.o),1);if(selected===e.o)deselect();}
  else{scene.add(e.o);placed.push(e.o);}
  showToast('Geri alındı',1200);
};
window.resetCamera=()=>{
  camera.position.set(3.8,1.8,3.8);
  controls.target.set(-2,0.8,-2);
  controls.update();
  showToast('Kamera sıfırlandı',1000);
};
window.clearRoom=()=>{
  if(!confirm('Tüm mobilyaları sil?')) return;
  placed.forEach(o=>scene.remove(o)); placed.length=history.length=0; deselect();
};
window.snap2screenshot=()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.href=renderer.domElement.toDataURL('image/png');
  a.download='makeroom.png'; a.click();
  showToast('Fotoğraf kaydedildi 📸',2000);
};

// ── POINTER ───────────────────────────────────────────────────────────────────
let pDown=0, pMoved=false, pLast={x:0,y:0};
let dragging=false, dragOff=new THREE.Vector3();
let tapN=0, tapT=null;

function ndcOf(e){
  const r=renderer.domElement.getBoundingClientRect();
  return new THREE.Vector2(
    ((e.clientX-r.left)/r.width)*2-1,
   -((e.clientY-r.top)/r.height)*2+1);
}
function floorHit(ndc){
  ray.setFromCamera(ndc,camera);
  const t=new THREE.Vector3();
  return ray.ray.intersectPlane(floorPl,t)?t:null;
}

function onPtrDown(e){
  pDown=Date.now(); pMoved=false; pLast={x:e.clientX,y:e.clientY};
  if(!selected||placing) return;
  const ndc=ndcOf(e); ray.setFromCamera(ndc,camera);
  const ms=[]; selected.traverse(c=>{if(c.isMesh)ms.push(c);});
  if(ray.intersectObjects(ms,false).length){
    const t=floorHit(ndc);
    if(t){dragging=true;controls.enabled=false;dragOff.copy(selected.position).sub(t);}
  }
}
function onPtrMove(e){
  const dx=e.clientX-pLast.x, dy=e.clientY-pLast.y;
  if(Math.sqrt(dx*dx+dy*dy)>6) pMoved=true;
  const ndc=ndcOf(e);
  if(placing&&ghost){
    const t=floorHit(ndc); if(t) ghost.position.set(snap(t.x),0,snap(t.z));
  }
  if(dragging&&selected){
    const t=floorHit(ndc);
    if(t){selected.position.x=snap(t.x+dragOff.x);selected.position.z=snap(t.z+dragOff.z);pMoved=true;}
  }
}
function onPtrUp(e){
  if(dragging){dragging=false;controls.enabled=!placing;return;}
  if(pMoved||Date.now()-pDown>380) return;
  const ndc=ndcOf(e);

  if(placing){
    tapN++; if(tapT)clearTimeout(tapT);
    tapT=setTimeout(()=>tapN=0,350);
    if(tapN>=2){cancelPlace();tapN=0;return;}
    const t=floorHit(ndc); if(t) placeAt(t);
    return;
  }

  // Hit test placed furniture
  const ms=[]; placed.forEach(o=>o.traverse(c=>{if(c.isMesh)ms.push(c);}));
  ray.setFromCamera(ndc,camera);
  const hits=ray.intersectObjects(ms,false);
  if(hits.length){
    let r=hits[0].object;
    while(r.parent&&!r.name.startsWith('placed_'))r=r.parent;
    if(placed.includes(r)){doSelect(r);return;}
  }
  deselect();
}

function onKey(e){
  if(e.key==='Escape'){placing?cancelPlace():deselect();}
  if(e.key==='r') window.rotateSelected(90);
  if(e.key==='Delete'||e.key==='Backspace') window.deleteSelected();
  if((e.metaKey||e.ctrlKey)&&e.key==='z') window.undoLast();
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
function onResize(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight,false);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTmr;
window.showToast=function(msg,dur=3000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('on'),dur);
};
function showToast(m,d){ window.showToast(m,d); }

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene,camera); }

init();
